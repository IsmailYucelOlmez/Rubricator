name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Create env.production.json for CI build
        run: |
          SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          cat > env.production.json <<EOF
          {
            "API_URL": "${SUPABASE_URL}/functions/v1",
            "SUPABASE_URL": "${SUPABASE_URL}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}"
          }
          EOF

      - name: Build web
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            BASE_HREF="/"
          else
            BASE_HREF="/${REPO_NAME}/"
          fi
          flutter build web --release \
            --dart-define-from-file=env.production.json \
            --base-href "${BASE_HREF}"

      - name: Add account deletion page
        run: |
          mkdir -p build/web/account-deletion
          cp web/account-deletion/index.html build/web/account-deletion/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: build/web
